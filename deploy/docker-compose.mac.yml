# ===========================================
# MAC-LOCAL OVERRIDE for the Phase-72 copilot stack
# ===========================================
# This is a Compose OVERRIDE layered ON TOP of deploy/docker-compose.prod.yml —
# it is NOT a fork. Run it as:
#
#   docker compose -f deploy/docker-compose.prod.yml -f deploy/docker-compose.mac.yml up -d
#
# Everything (nginx /api/copilot SSE proxy, frontend, backend, redis,
# langfuse, phoenix, the intl-dossier network, the expose-only contract, and the
# agent-runtime SUPABASE_ANON_KEY + caller-JWT keystone) is INHERITED verbatim from
# the prod file. The ONLY divergence from prod is the two GPU-bound backends, swapped
# for Mac-runnable equivalents:
#   - the LLM: vLLM (CUDA-only) is gated out; the host's Ollama serves the model.
#   - TEI embed + rerank: the GPU image is swapped for the CPU image (linux/amd64).
#
# Do NOT run vLLM on Mac — it requires an NVIDIA GPU and will crash on Apple Silicon.
# See deploy/MAC-LOCAL.md for the full runbook.

services:
  # vLLM is CUDA-only. A profiles gate EXCLUDES it from a plain `docker compose up`
  # on Mac (the model is served by Ollama on the host instead — see agent-runtime
  # below). Rationale: `deploy.replicas: 0` is Swarm-only and is SILENTLY IGNORED by
  # `docker compose up`, so vLLM would still try to start; a profiles gate is the
  # reliable exclusion for non-Swarm Compose. The service stays DEFINED in the prod
  # file — this only gates it out of the Mac run (enable with `--profile gpu-only`).
  vllm:
    profiles: ['gpu-only']

  # langfuse is the heavy self-hosted observability backend; it is NOT needed for the
  # Phase-72 proofs and adds real memory pressure under x86 emulation. A profiles gate
  # EXCLUDES it from a plain Mac `up` (phoenix + OTel export stay, so tracing still
  # works). Enable the full observability stack with `--profile langfuse-full`.
  langfuse:
    profiles: ['langfuse-full']

  # Override ONLY the two model-pointer env vars so the copilot calls the Mac-host
  # Ollama (OpenAI-compatible) instead of the in-network vLLM, using the SAME knob
  # prod uses. Compose deep-merges `environment` maps, so every other agent-runtime
  # env (SUPABASE_URL, SUPABASE_ANON_KEY, ALLOWED_ORIGINS, TEI_EMBED_URL,
  # TEI_RERANK_URL, DATABASE_URL, OTEL_EXPORTER_OTLP_ENDPOINT) and the
  # build/expose/depends_on/networks all inherit from prod UNCHANGED.
  # getCopilotModel() appends `/v1` → Ollama's OpenAI-compatible endpoint at
  # :11434/v1 as model gemma4:12b (real Gemma 4 12B, GA 2026-06-03; the Mac
  # equivalent of prod's google/gemma-4-12B-it — Ollama tag advertises the
  # `tools` capability and is tool-call-verified). The keystone (anon key +
  # caller JWT, NO service-role) is inherited from prod and MUST stay that way.
  agent-runtime:
    environment:
      VLLM_BASE_URL: http://host.docker.internal:11434
      VLLM_MODEL: gemma4:12b
      # Persistent copilot threads (D-08): point @mastra/pg's PostgresStore at the
      # Mac-local `mastra-pg` service below. buildMemory() (copilot.ts) reads
      # MASTRA_PG_URL — when set it returns a Memory backed by Postgres, so the agent
      # stores + recalls thread history (default lastMessages: 10) keyed by the
      # AG-UI threadId + JWT-derived resourceId, and conversations survive container
      # restarts. Compose deep-merges `environment`, so the prod agent-runtime env
      # (SUPABASE_*, ALLOWED_ORIGINS, TEI_*, OTEL_*) is inherited UNCHANGED.
      # PROD points MASTRA_PG_URL at the Supabase Postgres separately — NOT here.
      MASTRA_PG_URL: postgresql://postgres:${MASTRA_LOCAL_PG_PASSWORD:-mastra_local_dev}@mastra-pg:5432/postgres
    depends_on:
      mastra-pg:
        condition: service_healthy

  # ===========================================
  # MASTRA-PG - Mac-local Postgres for persistent copilot threads
  # ===========================================
  # Mac-ONLY service backing @mastra/memory's @mastra/pg PostgresStore so copilot
  # threads + messages (mastra_threads / mastra_messages, auto-created by
  # PostgresStore on first use) survive `docker restart`. Internal-only (NO host
  # `ports:`), single user, on the inherited intl-dossier network so agent-runtime
  # reaches it by name as `mastra-pg:5432`. Durability via the named volume
  # mastra_pg_data (declared at the bottom of this file, merged with prod's
  # redis_data). PROD does NOT use this — it points MASTRA_PG_URL at the Supabase
  # Postgres and applies owner-only RLS on the two tables (72-03/04/05 carry-over),
  # a deploy-time follow-up not needed for the Mac single-user case. The password is
  # a LOCAL, non-exposed dev credential (override via MASTRA_LOCAL_PG_PASSWORD in
  # deploy/.env); it is not a production secret.
  mastra-pg:
    image: postgres:16-alpine
    container_name: intl-dossier-mastra-pg
    restart: unless-stopped
    environment:
      POSTGRES_PASSWORD: ${MASTRA_LOCAL_PG_PASSWORD:-mastra_local_dev}
      POSTGRES_DB: postgres
    volumes:
      - mastra_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres -d postgres']
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - intl-dossier

  # TEI ships no native arm64 image, so override to the CPU build and pin the amd64
  # platform (runs under emulation on Apple Silicon). Keep the SAME service name,
  # `expose: ["80"]`, and the SAME `--model-id` so TEI_EMBED_URL resolves unchanged.
  # Note: the prod TEI services declare NO GPU `deploy.resources.reservations.devices`
  # block (only vllm does), so there is NOTHING to neutralize here — the image +
  # platform swap is sufficient. Do not add a phantom `deploy:` removal.
  #
  # Memory constraint (Mac-only): under x86 emulation TEI's DEFAULT batch buffers
  # (max-batch-tokens 16384, ~17 tokenization-workers, 512 concurrent) balloon to ~13GiB
  # and OOM the VM. The flags below cap each TEI server to ~2.3GiB — tuned for the
  # single-query proof workload, NOT throughput. Drop them on a real GPU host (prod),
  # where the GPU image's defaults fit comfortably.
  tei-embed:
    image: ghcr.io/huggingface/text-embeddings-inference:cpu-latest
    platform: linux/amd64
    command: --model-id BAAI/bge-m3 --max-batch-tokens 2048 --max-concurrent-requests 8 --tokenization-workers 2 --max-client-batch-size 2

  # Same CPU/amd64 swap for the cross-encoder reranker; service name, expose:80, and
  # --model-id unchanged so TEI_RERANK_URL resolves unchanged. No GPU `deploy:` block
  # exists on the prod reranker either — nothing to neutralize.
  tei-rerank:
    image: ghcr.io/huggingface/text-embeddings-inference:cpu-latest
    platform: linux/amd64
    command: --model-id BAAI/bge-reranker-v2-m3 --max-batch-tokens 2048 --max-concurrent-requests 8 --tokenization-workers 2 --max-client-batch-size 2

# ===========================================
# VOLUMES (Mac-local additions; Compose merges this with prod's redis_data)
# ===========================================
volumes:
  # Durable storage for the Mac-local mastra-pg Postgres (persistent copilot threads).
  mastra_pg_data:
