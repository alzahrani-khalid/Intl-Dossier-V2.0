<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- Cache-busting: Force browser to always fetch fresh HTML -->
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate, max-age=0" />
    <meta http-equiv="Pragma" content="no-cache" />
    <meta http-equiv="Expires" content="0" />
    <title>GASTAT International Dossier</title>
    <!-- FOUC-safe bootstrap: sets first-paint tokens from localStorage BEFORE any stylesheet.
         External blocking script (Plan 33-03 decision: option-c, no CSP changes needed).
         Palette literals in /bootstrap.js MUST byte-match frontend/src/design-system/tokens/directions.ts (PALETTES).
         Keys match design-provider: id.dir / id.theme / id.hue / id.density. -->
    <script src="/bootstrap.js" blocking="render"></script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
