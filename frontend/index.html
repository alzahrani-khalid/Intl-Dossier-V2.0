<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- Cache-busting: Force browser to always fetch fresh HTML -->
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate, max-age=0" />
    <meta http-equiv="Pragma" content="no-cache" />
    <meta http-equiv="Expires" content="0" />
    <title>GASTAT International Dossier</title>

    <!-- Design-system fonts (handoff IntelDossier Redesign.html). Per-direction
         tokens map to: Fraunces (chancery display), Inter (bureau display + body),
         Public Sans (ministerial), Space Grotesk + IBM Plex (situation),
         JetBrains Mono (mono), Tajawal (Arabic display+body). Without this link
         the --font-display/body/mono CSS vars fall back to system serif and the
         direction theming silently breaks. -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,500;0,9..144,600;1,9..144,400&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&family=IBM+Plex+Sans:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&family=Space+Grotesk:wght@400;500;600;700&family=Public+Sans:wght@400;500;600;700&family=Tajawal:wght@400;500;700&display=swap"
      rel="stylesheet"
    />

    <!-- FOUC-safe bootstrap: sets first-paint tokens from localStorage BEFORE any stylesheet.
         External blocking script (Plan 33-03 decision: option-c, no CSP changes needed).
         Palette literals in /bootstrap.js MUST byte-match frontend/src/design-system/tokens/directions.ts (PALETTES).
         Keys match design-provider: id.dir / id.theme / id.hue / id.density. -->
    <script src="/bootstrap.js" blocking="render"></script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
