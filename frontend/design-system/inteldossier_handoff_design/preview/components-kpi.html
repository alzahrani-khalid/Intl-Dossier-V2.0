<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"/></head>
<body>
<div class="dscard" style="padding:0;overflow:hidden">
  <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:1px;background:#e8e4dc;">
    <div style="background:#fff;padding:18px 20px;display:flex;flex-direction:column;gap:6px;position:relative">
      <div style="position:absolute;top:0;left:0;right:0;height:2px;background:oklch(58% 0.14 32)"></div>
      <div style="font-size:10.5px;text-transform:uppercase;letter-spacing:0.1em;color:#9a9082;font-weight:600">Active engagements</div>
      <div style="font-size:36px;font-weight:600;letter-spacing:-0.02em;line-height:1;display:flex;align-items:baseline;gap:10px"><span>142</span><span style="font-size:11px;font-family:JetBrains Mono;color:oklch(52% 0.12 155)">▲ +12</span></div>
      <div style="font-size:11.5px;color:#6b6459">vs last week</div>
    </div>
    <div style="background:#fff;padding:18px 20px;display:flex;flex-direction:column;gap:6px">
      <div style="font-size:10.5px;text-transform:uppercase;letter-spacing:0.1em;color:#9a9082;font-weight:600">Open positions</div>
      <div style="font-size:36px;font-weight:600;letter-spacing:-0.02em;line-height:1;display:flex;align-items:baseline;gap:10px"><span>38</span><span style="font-size:11px;font-family:JetBrains Mono;color:oklch(52% 0.18 25)">▼ -3</span></div>
      <div style="font-size:11.5px;color:#6b6459">across 11 dossiers</div>
    </div>
    <div style="background:#fff;padding:18px 20px;display:flex;flex-direction:column;gap:6px">
      <div style="font-size:10.5px;text-transform:uppercase;letter-spacing:0.1em;color:#9a9082;font-weight:600">SLA compliance</div>
      <div style="font-size:36px;font-weight:600;letter-spacing:-0.02em;line-height:1">94<span style="font-size:18px;color:#9a9082">%</span></div>
      <div style="font-size:11.5px;color:#6b6459">last 30 days</div>
    </div>
    <div style="background:#fff;padding:18px 20px;display:flex;flex-direction:column;gap:6px">
      <div style="font-size:10.5px;text-transform:uppercase;letter-spacing:0.1em;color:#9a9082;font-weight:600">Forums coming</div>
      <div style="font-size:36px;font-weight:600;letter-spacing:-0.02em;line-height:1">7</div>
      <div style="font-size:11.5px;color:#6b6459">next 30 days</div>
    </div>
  </div>
</div>
</body></html>
