<!doctype html><html><head><meta charset="utf-8">

<body style="padding:0;background:#f7f6f4">
<div style="background:#f5f7f4;border:1px solid #e1e8e1;border-radius:10px;margin:22px;font-family:'Public Sans',sans-serif;overflow:hidden">
  <div style="display:flex;align-items:stretch">
    <div style="width:5px;background:oklch(58% 0.14 158)"></div>
    <div class="sampler" style="flex:1">
      <div class="sampler-head">
        <div>
          <div style="font-size:10.5px;text-transform:uppercase;letter-spacing:0.1em;color:#7a8a82;font-weight:600">Direction D</div>
          <div style="font-family:'Public Sans',sans-serif;font-size:30px;font-weight:600;letter-spacing:-0.02em;color:#0d1a14;line-height:1.1;margin-top:2px">Ministerial</div>
          <div style="font-size:13px;color:#4a5a52;margin-top:4px">Government-formal · clean · restrained</div>
        </div>
        <div class="sampler-meta" style="text-align:right;line-height:1.6;color:#7a8a82">
          Public Sans / Public Sans / JBM<br/>hue 158° · radius 6/10/14
        </div>
      </div>

      <div style="height:1px;background:#e1e8e1"></div>

      <div class="sampler-row">
        <button style="display:inline-flex;align-items:center;gap:6px;padding:7px 14px;border-radius:6px;border:1px solid #0d1a14;background:#0d1a14;color:#fff;font-size:13px;font-weight:500">+ New engagement</button>
        <button style="display:inline-flex;align-items:center;gap:6px;padding:7px 14px;border-radius:6px;border:1px solid oklch(58% 0.14 158);background:oklch(92% 0.05 158);color:oklch(42% 0.15 158);font-size:13px;font-weight:500">Approve</button>
        <span style="display:inline-flex;padding:2px 8px;border-radius:99px;font-size:11px;background:oklch(92% 0.05 158);color:oklch(42% 0.15 158);font-weight:500">Strategic partner</span>
        <span style="display:inline-flex;padding:2px 8px;border-radius:99px;font-size:11px;background:#ecf1ec;color:#4a5a52;font-weight:500">Bilateral</span>
        <div style="margin-inline-start:auto;font-family:JetBrains Mono;font-size:10.5px;color:#7a8a82">CONFIDENTIAL · INTERNAL</div>
      </div>
    </div>
  </div>
</div>
