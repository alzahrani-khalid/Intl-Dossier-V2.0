<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"/></head>
<body>
<div class="dscard">
  <div class="tlabel" style="margin-bottom:14px;">Corner radii — direction-specific shape language</div>
  <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:14px;">
    <div>
      <div style="height:60px;background:#fdfaf3;border:1px solid #e6ddc9;border-radius:2px;margin-bottom:8px"></div>
      <div style="font-size:12px;font-weight:600">Chancery</div>
      <div style="font-size:10.5px;color:#6b6459;font-family:JetBrains Mono">2 / 2 / 2</div>
    </div>
    <div>
      <div style="height:60px;background:#ffffff;border:1px solid #dde3ec;border-radius:3px;margin-bottom:8px"></div>
      <div style="font-size:12px;font-weight:600">Situation</div>
      <div style="font-size:10.5px;color:#6b6459;font-family:JetBrains Mono">2 / 3 / 4</div>
    </div>
    <div>
      <div style="height:60px;background:#ffffff;border:1px solid #e1e8e1;border-radius:10px;margin-bottom:8px"></div>
      <div style="font-size:12px;font-weight:600">Ministerial</div>
      <div style="font-size:10.5px;color:#6b6459;font-family:JetBrains Mono">6 / 10 / 14</div>
    </div>
    <div>
      <div style="height:60px;background:#ffffff;border:1px solid #e8e4dc;border-radius:12px;margin-bottom:8px"></div>
      <div style="font-size:12px;font-weight:600">Bureau</div>
      <div style="font-size:10.5px;color:#6b6459;font-family:JetBrains Mono">8 / 12 / 16</div>
    </div>
  </div>
</div>
</body></html>
