<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"/></head>
<body>
<div class="dscard">
  <div class="tlabel" style="margin-bottom:14px;">Semantic colors — solid for text/icons, soft for chip backgrounds</div>
  <div class="swatch-row">
    <div class="swatch"><div class="chip" style="background:oklch(52% 0.18 25)"></div><div class="name">danger</div><div class="val">h25 L52</div></div>
    <div class="swatch"><div class="chip" style="background:oklch(95% 0.04 25)"></div><div class="name">danger-soft</div><div class="val">h25 L95</div></div>
    <div class="swatch"><div class="chip" style="background:oklch(62% 0.14 75)"></div><div class="name">warn</div><div class="val">h75 L62</div></div>
    <div class="swatch"><div class="chip" style="background:oklch(95% 0.05 75)"></div><div class="name">warn-soft</div><div class="val">h75 L95</div></div>
    <div class="swatch"><div class="chip" style="background:oklch(52% 0.12 155)"></div><div class="name">ok</div><div class="val">h155 L52</div></div>
    <div class="swatch"><div class="chip" style="background:oklch(94% 0.04 155)"></div><div class="name">ok-soft</div><div class="val">h155 L94</div></div>
    <div class="swatch"><div class="chip" style="background:oklch(50% 0.14 230)"></div><div class="name">info</div><div class="val">h230 L50</div></div>
    <div class="swatch"><div class="chip" style="background:oklch(94% 0.04 230)"></div><div class="name">info-soft</div><div class="val">h230 L94</div></div>
  </div>
</div>
</body></html>
