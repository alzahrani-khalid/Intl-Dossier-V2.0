<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"/></head>
<body>
<div class="dscard">
  <div class="tlabel" style="margin-bottom:14px;">Accent — driven by per-direction hue</div>
  <div class="swatch-row">
    <div class="swatch"><div class="chip" style="background:oklch(58% 0.14 32)"></div><div class="name">Bureau</div><div class="val">h: 32°</div></div>
    <div class="swatch"><div class="chip" style="background:oklch(58% 0.14 22)"></div><div class="name">Chancery</div><div class="val">h: 22°</div></div>
    <div class="swatch"><div class="chip" style="background:oklch(58% 0.14 190)"></div><div class="name">Situation</div><div class="val">h: 190°</div></div>
    <div class="swatch"><div class="chip" style="background:oklch(58% 0.14 158)"></div><div class="name">Ministerial</div><div class="val">h: 158°</div></div>
  </div>
  <div class="divider"></div>
  <div class="tlabel" style="margin-bottom:14px;">Bureau accent triad — fg / soft / ink</div>
  <div class="swatch-row">
    <div class="swatch"><div class="chip" style="background:oklch(58% 0.14 32)"></div><div class="name">--accent</div><div class="val">L58 C.14</div></div>
    <div class="swatch"><div class="chip" style="background:oklch(92% 0.05 32)"></div><div class="name">--accent-soft</div><div class="val">L92 C.05</div></div>
    <div class="swatch"><div class="chip" style="background:oklch(42% 0.15 32)"></div><div class="name">--accent-ink</div><div class="val">L42 C.15</div></div>
    <div class="swatch"><div class="chip" style="background:oklch(99% 0.01 32);border-color:#e8e4dc"></div><div class="name">--accent-fg</div><div class="val">L99 C.01</div></div>
  </div>
</div>
</body></html>
