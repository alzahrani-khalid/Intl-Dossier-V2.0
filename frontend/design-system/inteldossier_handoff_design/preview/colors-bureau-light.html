<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"/></head>
<body>
<div class="dscard">
  <div class="label-row" style="margin-bottom:14px;">
    <div class="tlabel">Bureau · Light · surfaces &amp; ink</div>
  </div>
  <div class="swatch-row">
    <div class="swatch"><div class="chip" style="background:#f7f6f4"></div><div class="name">--bg</div><div class="val">#f7f6f4</div></div>
    <div class="swatch"><div class="chip" style="background:#ffffff"></div><div class="name">--surface</div><div class="val">#ffffff</div></div>
    <div class="swatch"><div class="chip" style="background:#efece3"></div><div class="name">--line-soft</div><div class="val">#efece3</div></div>
    <div class="swatch"><div class="chip" style="background:#e8e4dc"></div><div class="name">--line</div><div class="val">#e8e4dc</div></div>
    <div class="swatch"><div class="chip" style="background:#9a9082"></div><div class="name">--ink-faint</div><div class="val">#9a9082</div></div>
    <div class="swatch"><div class="chip" style="background:#6b6459"></div><div class="name">--ink-mute</div><div class="val">#6b6459</div></div>
    <div class="swatch"><div class="chip" style="background:#1a1714"></div><div class="name">--ink</div><div class="val">#1a1714</div></div>
  </div>
</div>
</body></html>
