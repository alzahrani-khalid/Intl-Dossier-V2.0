<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"/>
<style>
.chip { display:inline-flex;align-items:center;gap:4px;padding:2px 8px;border-radius:99px;font-size:11px;background:#efece3;color:#6b6459;font-weight:500;font-family:Inter; }
.chip-accent { background:oklch(92% 0.05 32);color:oklch(42% 0.15 32) }
.chip-danger { background:oklch(95% 0.04 25);color:oklch(52% 0.18 25) }
.chip-warn   { background:oklch(95% 0.05 75);color:oklch(62% 0.14 75) }
.chip-ok     { background:oklch(94% 0.04 155);color:oklch(52% 0.12 155) }
.chip-info   { background:oklch(94% 0.04 230);color:oklch(50% 0.14 230) }
</style></head>
<body>
<div class="dscard">
  <div class="tlabel" style="margin-bottom:12px;">Chips — neutral &amp; semantic</div>
  <div style="display:flex;gap:8px;flex-wrap:wrap;">
    <span class="chip">Bilateral</span>
    <span class="chip chip-accent">Strategic partner</span>
    <span class="chip chip-ok">On track</span>
    <span class="chip chip-warn">At risk</span>
    <span class="chip chip-danger">Breached</span>
    <span class="chip chip-info">Forum</span>
    <span class="chip">+12 more</span>
  </div>
  <div class="divider"></div>
  <div class="tlabel" style="margin-bottom:12px;">Situation direction — chips become mono micro-caps</div>
  <div style="display:flex;gap:8px;flex-wrap:wrap;">
    <span style="display:inline-flex;font-family:'IBM Plex Mono';font-size:10px;text-transform:uppercase;letter-spacing:0.08em;padding:1px 6px;border-radius:2px;background:#eaeef4;color:#425066">BILATERAL</span>
    <span style="display:inline-flex;font-family:'IBM Plex Mono';font-size:10px;text-transform:uppercase;letter-spacing:0.08em;padding:1px 6px;border-radius:2px;background:oklch(94% 0.04 155);color:oklch(52% 0.12 155)">ON TRACK</span>
    <span style="display:inline-flex;font-family:'IBM Plex Mono';font-size:10px;text-transform:uppercase;letter-spacing:0.08em;padding:1px 6px;border-radius:2px;background:oklch(95% 0.04 25);color:oklch(52% 0.18 25)">BREACHED</span>
  </div>
</div>
</body></html>
