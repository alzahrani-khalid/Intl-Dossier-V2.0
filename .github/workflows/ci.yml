name: CI

on:
  push:
    branches: [main, develop, 'feature/*']
  pull_request:
    branches: [main, develop]

env:
  # Vite 7+ and @vitejs/plugin-react 5 require Node >= 20.19.0.
  # Backend uses ts-node ESM features as well.
  # posthog-node@5.35.1 (transitive) raises the floor to >=22.22.0.
  NODE_VERSION: '22.22.0'
  # pnpm version must match packageManager field in package.json
  PNPM_VERSION: '10.29.1'

jobs:
  repo-policy:
    name: Repo Policy (Secrets/Artifacts)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Block committed env files and build artifacts
        shell: bash
        run: |
          set -euo pipefail

          # Disallow tracked environment files (except *.example templates and ios/.xcode.env)
          env_files="$(git ls-files | grep -E '(^|/)\\.env($|\\.)|\\.env$' || true)"
          forbidden_env_files="$(echo "$env_files" | grep -v -E '\\.example$|^ios/\\.xcode\\.env$' | sed '/^$/d' || true)"
          if [ -n "${forbidden_env_files:-}" ]; then
            echo "Forbidden tracked env files found (use *.example templates instead):"
            echo "$forbidden_env_files"
            exit 1
          fi

          # Disallow tracked build artifacts
          if git ls-files | grep -q '^frontend/dist-test/'; then
            echo 'Forbidden tracked build artifacts found: frontend/dist-test/'
            exit 1
          fi

  lint:
    name: Lint
    runs-on: ubuntu-latest
    needs: [repo-policy]
    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run linting
        run: pnpm run lint

      - name: Check edge-fn schema references
        run: pnpm run check:edge-fn-schema

      - name: Assert edge-fn schema check fails on bad fixture (positive-failure)
        shell: bash
        run: |
          set -e
          ! node scripts/check-edge-fn-schema-refs.mjs tools/edge-fn-fixtures/bad-schema-ref

  design-token-check:
    name: Design Token Check
    runs-on: ubuntu-latest
    needs: [repo-policy]
    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Assert design-token fixture fails lint (positive-failure)
        shell: bash
        run: |
          set -e
          ! pnpm exec eslint -c eslint.config.mjs --max-warnings 0 \
            tools/eslint-fixtures/bad-design-token.tsx

  i18next-factory-check:
    name: react-i18next Factory Check
    runs-on: ubuntu-latest
    needs: [repo-policy]
    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Assert vi.mock fixture fails lint (positive-failure)
        shell: bash
        run: |
          set -e
          ! pnpm exec eslint -c eslint.config.mjs --max-warnings 0 \
            tools/eslint-fixtures/bad-vi-mock.ts

  type-check:
    name: type-check
    runs-on: ubuntu-latest
    needs: [repo-policy]
    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Type-check frontend
        run: pnpm --filter intake-frontend type-check

      - name: Type-check backend
        run: pnpm --filter intake-backend type-check

  test-frontend:
    name: Tests (frontend)
    runs-on: ubuntu-latest
    needs: [repo-policy]
    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run frontend tests
        run: pnpm --filter intake-frontend test --run

  test-backend:
    name: Tests (backend)
    runs-on: ubuntu-latest
    needs: [repo-policy]
    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run backend tests
        run: pnpm --filter intake-backend test --run

  test-integration:
    name: Tests (integration)
    runs-on: ubuntu-latest
    needs: [repo-policy]
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run backend integration tests
        run: pnpm --filter intake-backend test:integration

  test-e2e:
    name: E2E Tests
    runs-on: ubuntu-latest
    needs: [repo-policy]
    env:
      # Map the analyst test user + Supabase config from existing E2E_* secrets
      # so the Playwright global-setup can authenticate (was the cred wall).
      TEST_USER_EMAIL: ${{ secrets.E2E_ANALYST_EMAIL }}
      TEST_USER_PASSWORD: ${{ secrets.E2E_ANALYST_PASSWORD }}
      VITE_SUPABASE_URL: ${{ secrets.E2E_SUPABASE_URL }}
      VITE_SUPABASE_ANON_KEY: ${{ secrets.E2E_SUPABASE_ANON_KEY }}
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: test_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright Browsers
        run: pnpm exec playwright install --with-deps

      - name: Run E2E tests
        run: pnpm run test:e2e
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/test_db

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 30

  test-rtl-responsive:
    name: RTL + Responsive Tests
    runs-on: ubuntu-latest
    needs: [lint, type-check]
    env:
      # See E2E Tests job — local dev server authenticates against staging Supabase.
      TEST_USER_EMAIL: ${{ secrets.E2E_ANALYST_EMAIL }}
      TEST_USER_PASSWORD: ${{ secrets.E2E_ANALYST_PASSWORD }}
      VITE_SUPABASE_URL: ${{ secrets.E2E_SUPABASE_URL }}
      VITE_SUPABASE_ANON_KEY: ${{ secrets.E2E_SUPABASE_ANON_KEY }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright Browsers
        run: pnpm exec playwright install --with-deps chromium

      - name: Run RTL + Responsive tests
        run: pnpm exec playwright test tests/e2e/dossier-rtl-mobile.spec.ts --reporter=html
        working-directory: ./frontend

      - name: Upload RTL + Responsive test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: rtl-responsive-report
          path: frontend/playwright-report/
          retention-days: 30

  test-a11y:
    name: Accessibility Tests (RTL + WCAG AA)
    runs-on: ubuntu-latest
    needs: [lint, type-check]
    env:
      # See E2E Tests job — local dev server authenticates against staging Supabase.
      TEST_USER_EMAIL: ${{ secrets.E2E_ANALYST_EMAIL }}
      TEST_USER_PASSWORD: ${{ secrets.E2E_ANALYST_PASSWORD }}
      VITE_SUPABASE_URL: ${{ secrets.E2E_SUPABASE_URL }}
      VITE_SUPABASE_ANON_KEY: ${{ secrets.E2E_SUPABASE_ANON_KEY }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright Browsers
        run: pnpm exec playwright install --with-deps chromium

      - name: Run Accessibility tests
        run: pnpm exec playwright test --project=a11y --reporter=html
        working-directory: ./frontend

      - name: Upload Accessibility test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: a11y-report
          path: frontend/playwright-report/
          retention-days: 30

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [lint, type-check, test-frontend, test-backend]
    strategy:
      matrix:
        package: [backend, frontend]

    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build ${{ matrix.package }}
        run: pnpm run build --filter=intake-${{ matrix.package }}

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-${{ matrix.package }}
          path: ${{ matrix.package }}/dist/
          retention-days: 7

  bundle-size-check:
    name: Bundle Size Check (size-limit)
    runs-on: ubuntu-latest
    needs: [lint, type-check]
    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build frontend
        run: pnpm -C frontend build

      - name: Assert size-limit paths match built files
        run: node frontend/scripts/assert-size-limit-matches.mjs

      - name: Check bundle size budgets
        run: pnpm -C frontend size-limit

  eval-gate:
    name: Eval Gate
    runs-on: ubuntu-latest
    needs: [lint, type-check]
    # `secrets` cannot be referenced in a step `if:` (GitHub rejects the workflow at
    # dispatch). Surface the gate secret as a job-level env var so the deploy-gated
    # live-scoring step can guard on env.EVAL_AI_URL instead.
    env:
      EVAL_AI_URL: ${{ secrets.EVAL_AI_URL }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # ── CI-mode (REQUIRED — no judge endpoint, no GPU, no secret guard) ──────────────
      # EVAL-02 computed precision/recall (74-01) + the EVAL-01/03 structural + degraded
      # positive-failure checks (74-09). With EVAL_AI_URL/VLLM_BASE_URL unset,
      # isJudgeConfigured() is false so the live-scoring assertions skip; the computed
      # and structural checks run and MUST pass. A real regression fails the build (D6).
      - name: Run CI-mode evals (EVAL-02 computed + EVAL-01/03 structural)
        run: pnpm --filter agent-runtime test:eval

      # The static "no AnythingLLM on the 3 critical surfaces" guard (74-08 / D3).
      - name: Check no AnythingLLM on critical surfaces
        run: pnpm run check:no-anythingllm

      # Positive-failure proof: the guard MUST exit 1 on the planted fixture, mirroring
      # the repo-policy bad-fixture assert. If the guard ever silently passes on a
      # re-added AnythingLLM reference, this step flips and fails the build.
      - name: Assert no-AnythingLLM guard fails on planted fixture (positive-failure)
        shell: bash
        run: |
          set -e
          ! node scripts/check-no-anythingllm.mjs tools/anythingllm-fixtures/critical-surface-with-anythingllm

      # ── Live-mode (DEPLOY-GATED, NON-blocking — D6) ──────────────────────────────────
      # Generative EVAL-01/03 judge scoring runs ONLY when the on-prem judge endpoint
      # secret is present, mirroring the P72/P73 deploy gate. isJudgeConfigured() now
      # sees EVAL_AI_URL so the 74-09 judge assertions activate. continue-on-error keeps
      # it NON-blocking until the GPU/gemma host is permanent.
      - name: Live judge scoring (deploy-gated)
        if: ${{ env.EVAL_AI_URL != '' }}
        continue-on-error: true
        env:
          EVAL_AI_URL: ${{ secrets.EVAL_AI_URL }}
          EVAL_AI_API_KEY: ${{ secrets.EVAL_AI_API_KEY }}
        run: pnpm --filter agent-runtime test:eval

  lighthouse-ci:
    name: Lighthouse CI
    runs-on: ubuntu-latest
    needs: [build]
    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Download frontend build
        uses: actions/download-artifact@v4
        with:
          name: build-frontend
          path: frontend/dist/

      - name: Run Lighthouse CI
        run: pnpm exec lhci autorun
        env:
          LHCI_GITHUB_APP_TOKEN: ${{ secrets.LHCI_GITHUB_APP_TOKEN }}
        continue-on-error: true

      - name: Upload Lighthouse report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: lighthouse-report
          path: .lighthouseci/
          retention-days: 30

  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: [build]
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop')

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha

      - name: Build and push Docker images
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'sarif'
          output: 'trivy-results.sarif'

      - name: Upload Trivy results to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v2
        with:
          sarif_file: 'trivy-results.sarif'
