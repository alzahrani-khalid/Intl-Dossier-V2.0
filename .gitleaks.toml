# Gitleaks configuration for Intl-DossierV2.0
# Detects exposed secrets in git history and staged commits
# Reference: https://github.com/gitleaks/gitleaks

title = "Intl-DossierV2.0 Secrets Detection"

# Global allowlist - paths to exclude from scanning
[allowlist]
description = "Global allowlist for false positives"
paths = [
    '''\.env\.example$''',
    '''\.env\.test\.example$''',
    '''\.gitleaks\.toml$''',
    '''\.gitleaks-report\.json$''',
    '''docs/SECRETS_.*\.md$''',
    '''docs/INCIDENT_RESPONSE\.md$''',
    '''\.auto-claude/''',
]
regexes = [
    '''placeholder''',
    '''your-.*-here''',
    '''example\.com''',
    '''test-secret''',
    '''fake-key''',
]

# Supabase Service Role Key (bypasses RLS)
[[rules]]
id = "supabase-service-role-key"
description = "Supabase SERVICE_ROLE_KEY (bypasses RLS policies)"
regex = '''(?i)(?:supabase_service_role_key|service_role_key|service-role-key)[\s]*[=:]["']?(eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9\.[A-Za-z0-9_-]+\.[A-Za-z0-9_-]+)["']?'''
tags = ["key", "supabase", "critical"]
[[rules.Entropies]]
    Min = "4.5"
    Max = "8"

# Supabase Anon/Public Key
[[rules]]
id = "supabase-anon-key"
description = "Supabase ANON_KEY or PUBLIC_KEY"
regex = '''(?i)(?:supabase_anon_key|supabase_public_key|anon_key|public_key)[\s]*[=:]["']?(eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9\.[A-Za-z0-9_-]+\.[A-Za-z0-9_-]+)["']?'''
tags = ["key", "supabase"]

# Supabase URL with embedded credentials
[[rules]]
id = "supabase-url-with-key"
description = "Supabase URL with embedded API key"
regex = '''(?i)(?:supabase_url|supabase_api_url)[\s]*[=:]["']?https?://[a-z0-9-]+\.supabase\.co["']?'''
tags = ["url", "supabase"]

# OpenAI API Keys (new format sk-proj-*)
[[rules]]
id = "openai-api-key-proj"
description = "OpenAI API Key (project format)"
regex = '''(?i)(?:openai_api_key|openai_key|api_key)[\s]*[=:]["']?(sk-proj-[A-Za-z0-9_-]{43,})["']?'''
tags = ["key", "openai", "api"]
[[rules.Entropies]]
    Min = "4.0"
    Max = "8"

# OpenAI API Keys (legacy format sk-*)
[[rules]]
id = "openai-api-key-legacy"
description = "OpenAI API Key (legacy format)"
regex = '''(?i)(?:openai_api_key|openai_key|api_key)[\s]*[=:]["']?(sk-[A-Za-z0-9]{32,})["']?'''
tags = ["key", "openai", "api"]
[[rules.Entropies]]
    Min = "4.0"
    Max = "8"

# JWT Secret Keys
[[rules]]
id = "jwt-secret"
description = "JWT secret key"
regex = '''(?i)(?:jwt_secret|jwt_key|jwt_signing_key)[\s]*[=:]["']?([A-Za-z0-9+/]{32,}={0,2})["']?'''
tags = ["secret", "jwt"]
[[rules.Entropies]]
    Min = "4.5"
    Max = "8"

# Database Passwords (PostgreSQL format)
[[rules]]
id = "postgres-password"
description = "PostgreSQL database password"
regex = '''(?i)(?:postgres_password|database_password|db_password|pg_password)[\s]*[=:]["']?([A-Za-z0-9!@#$%^&*()_+\-=]{12,})["']?'''
tags = ["password", "database"]
[[rules.Entropies]]
    Min = "3.5"
    Max = "8"

# Database Connection Strings
[[rules]]
id = "database-connection-string"
description = "Database connection string with credentials"
regex = '''postgres(?:ql)?://[a-zA-Z0-9_-]+:[^@\s]+@[a-zA-Z0-9.-]+(?::[0-9]{1,5})?/[a-zA-Z0-9_-]+'''
tags = ["connection-string", "database", "critical"]

# AnythingLLM SIG_KEY
[[rules]]
id = "anythingllm-sig-key"
description = "AnythingLLM signature key"
regex = '''(?i)(?:sig_key|signature_key|anythingllm_sig_key)[\s]*[=:]["']?([A-Za-z0-9+/]{32,}={0,2})["']?'''
tags = ["key", "anythingllm"]
[[rules.Entropies]]
    Min = "4.0"
    Max = "8"

# AnythingLLM SIG_SALT
[[rules]]
id = "anythingllm-sig-salt"
description = "AnythingLLM signature salt"
regex = '''(?i)(?:sig_salt|signature_salt|anythingllm_sig_salt)[\s]*[=:]["']?([A-Za-z0-9+/]{16,}={0,2})["']?'''
tags = ["salt", "anythingllm"]
[[rules.Entropies]]
    Min = "3.5"
    Max = "8"

# Aceternity Pro API Key
[[rules]]
id = "aceternity-pro-api-key"
description = "Aceternity Pro API key"
regex = '''(?i)(?:aceternity_pro_api_key|aceternity_api_key)[\s]*[=:]["']?([A-Za-z0-9_-]{20,})["']?'''
tags = ["key", "aceternity"]

# Generic API Keys (high entropy strings)
[[rules]]
id = "generic-api-key"
description = "Generic API key pattern"
regex = '''(?i)(?:api_key|apikey|api_secret)[\s]*[=:]["']?([A-Za-z0-9_-]{32,})["']?'''
tags = ["key", "api"]
[[rules.Entropies]]
    Min = "4.5"
    Max = "8"

# Generic Secret Keys
[[rules]]
id = "generic-secret"
description = "Generic secret key pattern"
regex = '''(?i)(?:secret_key|secret|private_key)[\s]*[=:]["']?([A-Za-z0-9+/]{24,}={0,2})["']?'''
tags = ["secret"]
[[rules.Entropies]]
    Min = "4.0"
    Max = "8"

# Generic Passwords
[[rules]]
id = "generic-password"
description = "Generic password in configuration"
regex = '''(?i)(?:password|passwd|pwd)[\s]*[=:]["']?([A-Za-z0-9!@#$%^&*()_+\-=]{8,})["']?'''
tags = ["password"]
[[rules.Entropies]]
    Min = "3.0"
    Max = "8"

# Private Keys (RSA, SSH, etc.)
[[rules]]
id = "private-key"
description = "Private key (RSA, SSH, PGP)"
regex = '''-----BEGIN (?:RSA |EC |DSA |OPENSSH |PGP )?PRIVATE KEY-----'''
tags = ["key", "private", "critical"]

# AWS Access Keys
[[rules]]
id = "aws-access-key"
description = "AWS Access Key ID"
regex = '''(?i)(?:aws_access_key_id|aws_key_id)[\s]*[=:]["']?(AKIA[A-Z0-9]{16})["']?'''
tags = ["key", "aws"]

# AWS Secret Keys
[[rules]]
id = "aws-secret-key"
description = "AWS Secret Access Key"
regex = '''(?i)(?:aws_secret_access_key|aws_secret)[\s]*[=:]["']?([A-Za-z0-9/+=]{40})["']?'''
tags = ["key", "aws", "secret"]
[[rules.Entropies]]
    Min = "4.5"
    Max = "8"

# GitHub Personal Access Tokens
[[rules]]
id = "github-token"
description = "GitHub Personal Access Token"
regex = '''ghp_[A-Za-z0-9]{36,}'''
tags = ["token", "github"]

# Slack Tokens
[[rules]]
id = "slack-token"
description = "Slack API token"
regex = '''xox[baprs]-[A-Za-z0-9-]{10,}'''
tags = ["token", "slack"]

# Generic Bearer Tokens
[[rules]]
id = "bearer-token"
description = "Bearer token in Authorization header"
regex = '''(?i)(?:authorization|bearer)[\s]*[=:][\s]*["']?bearer[\s]+([A-Za-z0-9_\-\.]{20,})["']?'''
tags = ["token", "bearer"]
[[rules.Entropies]]
    Min = "4.0"
    Max = "8"
